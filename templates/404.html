{% extends "base.html" %}
{% block title %}404 – Page Not Found{% endblock %}

{% block body %}
<section class="error-section">
    <div class="container">
        <div class="error-content">
            <h1 class="error-code">4<span class="text-gradient">0</span>4</h1>
            <div class="error-glitch" data-text="PAGE NOT FOUND">PAGE NOT FOUND</div>
            <p class="error-message">The page you're looking for has drifted into the void. Let's get you back on track.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary-glow"><i class="bi bi-house-fill"></i> Back to Home</a>
        </div>
    </div>
</section>
{% endblock %}
