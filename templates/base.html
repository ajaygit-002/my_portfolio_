<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ajay S – AI Engineer specializing in Agentic AI Systems, RAG Architectures, and MCP Development. Building the future of autonomous AI.">
    <meta name="keywords" content="AI engineer, agentic AI, RAG, MCP, LangChain, multi-agent systems, machine learning, portfolio">
    <meta name="author" content="Ajay S">
    <meta name="theme-color" content="#050816">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Ajay S | AI Engineer & Agentic AI Developer">
    <meta property="og:description" content="Building autonomous AI systems, RAG pipelines, and MCP integrations.">
    <meta property="og:type" content="website">
    <title>{% block title %}Ajay S | AI Engineer & Agentic AI Developer{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Ajay S",
        "jobTitle": "AI Engineer & Agentic AI Developer",
        "description": "Specializing in Agentic AI Systems, RAG Architectures, and MCP Development",
        "knowsAbout": ["Artificial Intelligence", "Machine Learning", "RAG", "MCP", "LangChain", "Multi-Agent Systems"]
    }
    </script>

    {% block head %}{% endblock %}
</head>
<body>
    <!-- Loading Screen -->
    <div id="loader" class="loader-wrapper">
        <div class="loader-content">
            <div class="loader-ring">
                <div class="loader-ring-inner"></div>
            </div>
            <p class="loader-text">Initializing AI Systems<span class="dots"></span></p>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- Smooth Scroll Wrapper -->
    <div id="smooth-wrapper">
        <div id="smooth-content">
            {% block body %}{% endblock %}
        </div>
    </div>

    <!-- GSAP + Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollToPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/TextPlugin.min.js"></script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
